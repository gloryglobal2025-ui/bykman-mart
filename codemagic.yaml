workflows:
  android-workflow:
    name: Android AAB Release
    instance_type: mac_mini_m1
    max_build_duration: 60

    environment:
      groups:
        - google_play
      vars:
        PACKAGE_NAME: "com.bykmanfood.user"
      flutter: stable
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties

      - name: Clean project
        script: |
          flutter clean

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Increase Gradle memory
        script: |
          echo "org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=2g -Dfile.encoding=UTF-8" >> android/gradle.properties

      - name: Build Android App Bundle
        script: |
          flutter build appbundle \
            --release \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER

    artifacts:
      - build/app/outputs/bundle/release/*.aab

    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true