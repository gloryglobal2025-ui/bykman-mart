workflows:
  android-workflow:
    name: Android APK & AAB Release
    instance_type: mac_mini_m1
    max_build_duration: 60

    environment:
      groups:
        - google_play # Ensure MAPS_API_KEY is defined in this group in Codemagic UI
      vars:
        PACKAGE_NAME: "com.bykmanfood.user"
      flutter: stable
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "MAPS_API_KEY=$MAPS_API_KEY" >> android/local.properties

      - name: Clean project
        script: |
          flutter clean

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Configure Gradle Memory & Jetifier
        script: |
          # Fresh properties file to avoid duplicate/loop issues
          echo "org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=2g -Dfile.encoding=UTF-8" > android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          echo "android.jetifier.ignorelist=flutter-.*\\.jar,armeabi.*,x86.*" >> android/gradle.properties

      - name: Build Release APK
        script: |
          flutter build apk --release --build-name=1.0.0 --build-number=$BUILD_NUMBER

      - name: Build Release App Bundle
        script: |
          flutter build appbundle --release --build-name=1.0.0 --build-number=$BUILD_NUMBER

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      - build/app/outputs/bundle/release/app-release.aab

    publishing:
      email:
        recipients:
          - gloryglobal2025@gmail.com
        notify:
          success: true
          failure: true
